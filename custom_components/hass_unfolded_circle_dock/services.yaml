send_ir:
  name: Send IR
  description: Send an infrared code from the dock.
  fields:
    device_id:
      name: Dock
      description: Target dock device. Optional if only one dock is configured.
      required: false
      selector:
        device:
          integration: hass_unfolded_circle_dock
    code:
      name: Code
      description: The IR code to transmit (e.g. a PRONTO hex string).
      required: true
      example: "0000 006D 0022 0002 0155 00AA ..."
      selector:
        text:
    format:
      name: Format
      description: The IR code format.
      required: true
      example: "pronto"
      selector:
        select:
          custom_value: true
          options:
            - "pronto"
            - "hex"
    repeat:
      name: Repeat
      description: Number of times to repeat the code.
      default: 0
      selector:
        number:
          min: 0
          max: 50
          mode: box
    hold:
      name: Hold (ms)
      description: Hold the IR signal for this many milliseconds (firmware permitting).
      default: 0
      selector:
        number:
          min: 0
          max: 10000
          mode: box
    int_side:
      name: Internal side blaster
      default: false
      selector:
        boolean:
    int_top:
      name: Internal top blaster
      default: false
      selector:
        boolean:
    ext1:
      name: External port 1
      default: false
      selector:
        boolean:
    ext2:
      name: External port 2
      default: false
      selector:
        boolean:

stop_ir:
  name: Stop IR
  description: Stop an ongoing or repeating IR transmission.
  fields:
    device_id:
      name: Dock
      required: false
      selector:
        device:
          integration: hass_unfolded_circle_dock

identify:
  name: Identify
  description: Flash the dock LEDs to physically locate it.
  fields:
    device_id:
      name: Dock
      required: false
      selector:
        device:
          integration: hass_unfolded_circle_dock

set_volume:
  name: Set volume
  description: Set the dock charging/beep volume (0-100).
  fields:
    device_id:
      name: Dock
      required: false
      selector:
        device:
          integration: hass_unfolded_circle_dock
    volume:
      name: Volume
      required: true
      selector:
        number:
          min: 0
          max: 100
          mode: slider

set_brightness:
  name: Set brightness
  description: Set the brightness of the status and/or ethernet LEDs.
  fields:
    device_id:
      name: Dock
      required: false
      selector:
        device:
          integration: hass_unfolded_circle_dock
    status_led:
      name: Status LED
      description: 0–255.
      selector:
        number:
          min: 0
          max: 255
          mode: slider
    eth_led:
      name: Ethernet LED
      description: 0–255.
      selector:
        number:
          min: 0
          max: 255
          mode: slider

send_serial:
  name: Send serial
  description: Send data to an external port configured in RS232 mode.
  fields:
    device_id:
      name: Dock
      required: false
      selector:
        device:
          integration: hass_unfolded_circle_dock
    port:
      name: Port
      required: true
      selector:
        number:
          min: 1
          max: 2
          mode: box
    data:
      name: Data
      required: true
      selector:
        text:

set_port_mode:
  name: Set port mode
  description: Change the mode of an external port (e.g. RS232, TRIGGER_5V).
  fields:
    device_id:
      name: Dock
      required: false
      selector:
        device:
          integration: hass_unfolded_circle_dock
    port:
      name: Port
      required: true
      selector:
        number:
          min: 1
          max: 2
          mode: box
    mode:
      name: Mode
      required: true
      example: "RS232"
      selector:
        select:
          custom_value: true
          options:
            - "AUTO"
            - "NONE"
            - "IR_BLASTER"
            - "IR_EMITTER_MONO_PLUG"
            - "IR_EMITTER_STEREO_PLUG"
            - "TRIGGER_5V"
            - "RS232"
    baud_rate:
      name: Baud rate
      description: RS232 only. Line speed in bits/s (300–115200). Defaults to 9600.
      required: false
      example: 9600
      selector:
        select:
          custom_value: true
          options:
            - "300"
            - "600"
            - "1200"
            - "2400"
            - "4800"
            - "9600"
            - "19200"
            - "38400"
            - "57600"
            - "115200"
    data_bits:
      name: Data bits
      description: RS232 only. Defaults to 8.
      required: false
      selector:
        select:
          options:
            - "5"
            - "6"
            - "7"
            - "8"
    parity:
      name: Parity
      description: RS232 only. Defaults to none.
      required: false
      selector:
        select:
          options:
            - "none"
            - "even"
            - "odd"
    stop_bits:
      name: Stop bits
      description: RS232 only. Defaults to 1.
      required: false
      selector:
        select:
          options:
            - "1"
            - "1.5"
            - "2"

enable_serial_events:
  name: Enable serial events
  description: Subscribe (or unsubscribe) to incoming serial data events for a port.
  fields:
    device_id:
      name: Dock
      required: false
      selector:
        device:
          integration: hass_unfolded_circle_dock
    port:
      name: Port
      required: true
      selector:
        number:
          min: 1
          max: 2
          mode: box
    enable:
      name: Enable
      default: true
      selector:
        boolean:

refresh:
  name: Refresh
  description: Force an immediate refresh of the dock system information.
  fields:
    device_id:
      name: Dock
      required: false
      selector:
        device:
          integration: hass_unfolded_circle_dock

set_port_trigger:
  name: Set 5V trigger
  description: Assert, release, or pulse the 5V trigger output of an external port (port must be in TRIGGER_5V mode).
  fields:
    device_id:
      name: Dock
      required: false
      selector:
        device:
          integration: hass_unfolded_circle_dock
    port:
      name: Port
      required: true
      selector:
        number:
          min: 1
          max: 2
          mode: box
    trigger:
      name: State
      description: Turn the trigger on (true) or off (false).
      default: true
      selector:
        boolean:
    duration:
      name: Pulse duration
      description: Optional. If set, the trigger auto-releases after this many milliseconds.
      required: false
      selector:
        number:
          min: 1
          max: 600000
          unit_of_measurement: ms
          mode: box

reboot:
  name: Reboot
  description: Reboot the dock.
  fields:
    device_id:
      name: Dock
      required: false
      selector:
        device:
          integration: hass_unfolded_circle_dock
